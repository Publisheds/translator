name: Agent fix (aider via LiteLLM)

# Dispara cuando:
#   - Issue recibe label agent:auto o agent:supervised
#   - repository_dispatch desde bot-sync (slash /agent fix en coord)
#   - workflow_dispatch manual

on:
  issues:
    types: [labeled]
  repository_dispatch:
    types: [agent-fix]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

# Evita N runs concurrentes sobre el mismo issue (cuando el bot añade varias
# labels seguidas, GitHub dispara un evento `labeled` por cada una).
concurrency:
  group: agent-fix-${{ github.event.issue.number || github.event.client_payload.issue_number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  fix:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      contains(fromJson('["agent:auto","agent:supervised"]'), github.event.label.name)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PUBLISHEDS_COORD_BOT_APP_ID }}
          private-key: ${{ secrets.PUBLISHEDS_COORD_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install aider
        run: pip install aider-chat==0.86.2

      - name: Resolve issue number
        id: num
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "n=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "n=${{ github.event.client_payload.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "n=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          NUM=${{ steps.num.outputs.n }}
          # Una sola llamada a la API que trae title+body+labels en JSON.
          # jq -r unwrapping para obtener strings raw (no JSON-quoted).
          gh api "repos/${GITHUB_REPOSITORY}/issues/$NUM" > /tmp/issue.json
          jq -r '.title' < /tmp/issue.json > /tmp/issue-title.txt
          jq -r '.body'  < /tmp/issue.json > /tmp/issue-body.txt
          {
            printf '# '
            cat /tmp/issue-title.txt
            printf '\n\n'
            cat /tmp/issue-body.txt
            printf '\n\n---\nAplica el cambio mínimo necesario para resolver esto. Añade tests si corresponde.\n'
          } > /tmp/issue-msg.txt
          # Debug visible para diagnosticar:
          echo "=== /tmp/issue-title.txt ($(wc -c < /tmp/issue-title.txt) bytes) ==="
          cat /tmp/issue-title.txt
          echo
          echo "=== /tmp/issue-body.txt ($(wc -c < /tmp/issue-body.txt) bytes) ==="
          cat /tmp/issue-body.txt
          echo
          echo "=== /tmp/issue-msg.txt ($(wc -c < /tmp/issue-msg.txt) bytes) ==="
          head -c 1000 /tmp/issue-msg.txt
          echo
          # Labels para decidir modelo
          LABELS=$(jq -r '[.labels[].name] | join(",")' < /tmp/issue.json)
          MODEL="dsv4-flash"
          if echo "$LABELS" | grep -q "complexity:med";  then MODEL="qwen3-coder"; fi
          if echo "$LABELS" | grep -q "complexity:high"; then MODEL="dsv4-pro";    fi
          {
            echo "number=$NUM"
            echo "model=$MODEL"
          } >> "$GITHUB_OUTPUT"
          echo "Issue #$NUM | Model: $MODEL | Labels: $LABELS"

      # ─── Extrae los archivos sugeridos del body del issue ────────────────
      # El Planner LLM genera issues con una sección "## Archivos sugeridos"
      # listando paths en backticks. Sin esto, aider entra en modo "discovery"
      # y le pide al humano que añada archivos al chat → no aplica cambios →
      # no abre PR (bug detectado en smoke test del 2026-05-15).
      - name: Extract suggested files
        id: files
        shell: python
        run: |
          # Parser en Python nativo (bash heredoc rompe por indentación YAML).
          import os, re, pathlib

          body = open('/tmp/issue-body.txt', encoding='utf-8').read()
          repo = os.environ['GITHUB_REPOSITORY'].split('/')[-1]

          # Paths en backticks ASCII (0x60).
          candidates = re.findall(r'`([^`]+)`', body)

          # Filter: tiene / o extensión tipo .py / .ts / .tsx / etc.
          def looks_like_file(p):
              return '/' in p or bool(re.search(r'\.[a-zA-Z0-9]{1,8}$', p))
          candidates = [c for c in candidates if looks_like_file(c)]

          # Strip prefix de repo si está
          def strip_repo(p):
              return p[len(repo)+1:] if p.startswith(repo + '/') else p
          candidates = [strip_repo(c) for c in candidates]

          # Strip basura típica
          candidates = [re.sub(r'\s*\(.*\)\s*$', '', c) for c in candidates]
          candidates = [c.split('#')[0] for c in candidates]
          candidates = [c.strip() for c in candidates if c.strip()]

          # Dedup preservando orden
          seen = set()
          uniq = []
          for c in candidates:
              if c not in seen:
                  seen.add(c)
                  uniq.append(c)

          # Verificar existencia en el checkout
          final = [c for c in uniq if pathlib.Path(c).is_file()]

          # Debug
          print(f"Candidatos en backticks: {len(re.findall(r'`([^`]+)`', body))}")
          print(f"Tras filtros: {len(uniq)}")
          print(f"Existentes en checkout: {len(final)}")
          for c in uniq:
              print(f"  - {c}  ({'exists' if pathlib.Path(c).is_file() else 'MISSING'})")

          # Outputs
          with open('/tmp/issue-files.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(final))
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'count={len(final)}\n')
              f.write(f'files={" ".join(final)}\n')
          print(f"Suggested files ({len(final)}): {' '.join(final)}")

      - name: Create branch
        run: |
          BRANCH="agent/issue-${{ steps.issue.outputs.number }}-$(date +%s)"
          git config user.name  "publisheds-coord-bot[bot]"
          git config user.email "publisheds-coord-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Run aider
        env:
          OPENAI_API_KEY:  ${{ secrets.LITELLM_MASTER_KEY }}
          OPENAI_API_BASE: https://litellm.publisheds.dev/v1
          MODEL:           ${{ steps.issue.outputs.model }}
          FILES:           ${{ steps.files.outputs.files }}
        run: |
          # Prefix openai/ → aider usa cliente OpenAI-compatible contra LiteLLM proxy.
          # --yes-always: non-interactive total, autoconfirma todos los prompts.
          # Si el issue body listó archivos sugeridos, los pasamos como args
          # posicionales (equivalente a --file pero compatible con múltiples).
          # Si no los listó, dejamos que aider use su repo-map (más lento, peor
          # calidad, pero al menos intenta algo).
          if [ -n "$FILES" ]; then
            echo "▸ Pasando $(echo $FILES | wc -w) archivos sugeridos a aider"
            aider --model "openai/$MODEL" \
                  --yes-always \
                  --no-show-model-warnings \
                  --auto-commits \
                  --commit-prompt "fix: #${{ steps.issue.outputs.number }}" \
                  --message-file /tmp/issue-msg.txt \
                  $FILES
          else
            echo "▸ Sin archivos en el issue body — aider hace discovery (calidad reducida)"
            aider --model "openai/$MODEL" \
                  --yes-always \
                  --no-show-model-warnings \
                  --map-tokens 2048 \
                  --auto-commits \
                  --commit-prompt "fix: #${{ steps.issue.outputs.number }}" \
                  --message-file /tmp/issue-msg.txt
          fi

      - name: Push branch and open PR (via REST API)
        env:
          GH_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          BRANCH:        ${{ env.BRANCH }}
          ISSUE_NUM:     ${{ steps.issue.outputs.number }}
          MODEL:         ${{ steps.issue.outputs.model }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_RUN_ID:     ${{ github.run_id }}
        shell: python
        run: |
          # Approach API-only: en vez de git push (que tiene problemas raros
          # con tokens en GH Actions), usamos gh api para crear la branch ref
          # + commits con PUT /contents, y luego gh pr create.
          import os, subprocess, base64, json, sys

          REPO = os.environ['GITHUB_REPOSITORY']
          BRANCH = os.environ['BRANCH']
          DEFAULT_BRANCH = subprocess.run(
              ['gh', 'api', f'repos/{REPO}', '--jq', '.default_branch'],
              capture_output=True, text=True, check=True
          ).stdout.strip()
          ISSUE_NUM = os.environ['ISSUE_NUM']
          MODEL = os.environ['MODEL']

          # ¿aider hizo commits?
          local_commits = subprocess.run(
              ['git', 'log', f'origin/{DEFAULT_BRANCH}..HEAD', '--oneline'],
              capture_output=True, text=True
          ).stdout.strip()
          if not local_commits:
              print("Aider did not make commits. Closing run cleanly without PR.")
              subprocess.run([
                  'gh', 'issue', 'comment', ISSUE_NUM,
                  '--body',
                  f'🤖 aider corrió pero no aplicó cambios. Posibles causas: el archivo ya está en el estado deseado, el LLM no entendió el cambio, o faltan archivos en `## Archivos sugeridos`. Logs: {os.environ["GH_SERVER_URL"]}/{REPO}/actions/runs/{os.environ["GH_RUN_ID"]}.'
              ])
              sys.exit(0)

          # Crear la branch ref en remoto, basada en el SHA de origin/main
          main_sha = subprocess.run(
              ['git', 'rev-parse', f'origin/{DEFAULT_BRANCH}'],
              capture_output=True, text=True, check=True
          ).stdout.strip()
          subprocess.run([
              'gh', 'api', f'repos/{REPO}/git/refs', '-X', 'POST',
              '-f', f'ref=refs/heads/{BRANCH}',
              '-f', f'sha={main_sha}'
          ], check=True)
          print(f"✓ Branch {BRANCH} creada en remoto desde {main_sha[:8]}")

          # Archivos modificados por aider
          changed = subprocess.run(
              ['git', 'diff', '--name-only', f'origin/{DEFAULT_BRANCH}..HEAD'],
              capture_output=True, text=True, check=True
          ).stdout.strip().split('\n')
          print(f"✓ Archivos modificados: {len(changed)}")

          # Commit cada archivo modificado via PUT /contents
          for f in changed:
              if not f or not os.path.exists(f): continue
              with open(f, 'rb') as fh:
                  content_b64 = base64.b64encode(fh.read()).decode()
              # SHA actual del archivo en la branch (necesario para update)
              sha_check = subprocess.run(
                  ['gh', 'api', f'repos/{REPO}/contents/{f}?ref={BRANCH}', '--jq', '.sha'],
                  capture_output=True, text=True
              )
              args = [
                  'gh', 'api', f'repos/{REPO}/contents/{f}', '-X', 'PUT',
                  '-f', f'message=fix: #{ISSUE_NUM} — {f}',
                  '-f', f'content={content_b64}',
                  '-f', f'branch={BRANCH}',
              ]
              if sha_check.returncode == 0 and sha_check.stdout.strip():
                  args += ['-f', f'sha={sha_check.stdout.strip()}']
              subprocess.run(args, check=True, capture_output=True)
              print(f"  ✓ {f}")

          # Crear PR
          with open('/tmp/issue-title.txt') as fh:
              title = fh.read().strip()
          pr_body = (
              f'Closes #{ISSUE_NUM}\n\n'
              f'🤖 PR generado por `agent-fix.yml` con aider + `{MODEL}` vía LiteLLM '
              f'(ollama.com primary, DeepSeek fallback).\n\n'
              f'Espera el AI review automático en este PR.'
          )
          result = subprocess.run([
              'gh', 'pr', 'create',
              '--title', f'fix: {title}',
              '--body', pr_body,
              '--head', BRANCH,
              '--base', DEFAULT_BRANCH,
          ], capture_output=True, text=True)
          print(result.stdout)
          if result.returncode != 0:
              print(f"gh pr create stderr: {result.stderr}", file=sys.stderr)
              sys.exit(1)
