name: Agent fix (aider via LiteLLM)

# Dispara cuando:
#   - Issue recibe label agent:auto o agent:supervised
#   - repository_dispatch desde bot-sync (slash /agent fix en coord)
#   - workflow_dispatch manual

on:
  issues:
    types: [labeled]
  repository_dispatch:
    types: [agent-fix]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number'
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

# Evita N runs concurrentes sobre el mismo issue (cuando el bot añade varias
# labels seguidas, GitHub dispara un evento `labeled` por cada una).
concurrency:
  group: agent-fix-${{ github.event.issue.number || github.event.client_payload.issue_number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  fix:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch' ||
      contains(fromJson('["agent:auto","agent:supervised"]'), github.event.label.name)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PUBLISHEDS_COORD_BOT_APP_ID }}
          private-key: ${{ secrets.PUBLISHEDS_COORD_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install aider
        run: pip install aider-chat==0.86.2

      - name: Resolve issue number
        id: num
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "n=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "n=${{ github.event.client_payload.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "n=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          NUM=${{ steps.num.outputs.n }}
          # Title + body al filesystem (sin shell expansion = sin backticks ni $ interpretables).
          # IMPORTANTE: --template '{{.x}}' devuelve raw text (newlines reales).
          # --jq '.x' por defecto emite JSON-quoted (con \n literal) y rompe el parser.
          gh issue view "$NUM" --json title --template '{{.title}}' > /tmp/issue-title.txt
          gh issue view "$NUM" --json body  --template '{{.body}}'  > /tmp/issue-body.txt
          {
            printf '# '
            cat /tmp/issue-title.txt
            printf '\n\n'
            cat /tmp/issue-body.txt
            printf '\n\n---\nAplica el cambio mínimo necesario para resolver esto. Añade tests si corresponde.\n'
          } > /tmp/issue-msg.txt
          # Labels para decidir modelo
          LABELS=$(gh issue view "$NUM" --json labels --jq '[.labels[].name] | join(",")')
          MODEL="dsv4-flash"
          if echo "$LABELS" | grep -q "complexity:med";  then MODEL="qwen3-coder"; fi
          if echo "$LABELS" | grep -q "complexity:high"; then MODEL="dsv4-pro";    fi
          {
            echo "number=$NUM"
            echo "model=$MODEL"
          } >> "$GITHUB_OUTPUT"
          echo "Issue #$NUM | Model: $MODEL | Labels: $LABELS"

      # ─── Extrae los archivos sugeridos del body del issue ────────────────
      # El Planner LLM genera issues con una sección "## Archivos sugeridos"
      # listando paths en backticks. Sin esto, aider entra en modo "discovery"
      # y le pide al humano que añada archivos al chat → no aplica cambios →
      # no abre PR (bug detectado en smoke test del 2026-05-15).
      - name: Extract suggested files
        id: files
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          # 1) Paths en backticks: `path/to/file.ext`
          # 2) Filtra los que parecen archivos reales (tienen / o terminan en .ext)
          # 3) Quita prefix `<repo>/` si está (p. ej. "backend/StatBridge/..." → "StatBridge/...")
          # 4) Quita líneas/coordenadas tipo " (línea 48-49)" en el path
          # 5) Dedup
          # 6) Verifica que el archivo exista en el checkout (sino se descarta)
          grep -oE '`[^`]+`' /tmp/issue-body.txt 2>/dev/null \
            | sed 's/^`//;s/`$//' \
            | grep -E '\.[a-zA-Z0-9]{1,8}$|/' \
            | sed -E "s|^${REPO_NAME}/||" \
            | sort -u > /tmp/issue-files-raw.txt || true

          : > /tmp/issue-files.txt
          while IFS= read -r f; do
            if [ -n "$f" ] && [ -f "$f" ]; then
              echo "$f" >> /tmp/issue-files.txt
            fi
          done < /tmp/issue-files-raw.txt

          COUNT=$(wc -l < /tmp/issue-files.txt | tr -d ' ')
          FILES=$(tr '\n' ' ' < /tmp/issue-files.txt)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "files=$FILES"  >> "$GITHUB_OUTPUT"
          echo "Suggested files ($COUNT): $FILES"

      - name: Create branch
        run: |
          BRANCH="agent/issue-${{ steps.issue.outputs.number }}-$(date +%s)"
          git config user.name  "publisheds-coord-bot[bot]"
          git config user.email "publisheds-coord-bot[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Run aider
        env:
          OPENAI_API_KEY:  ${{ secrets.LITELLM_MASTER_KEY }}
          OPENAI_API_BASE: https://litellm.publisheds.dev/v1
          MODEL:           ${{ steps.issue.outputs.model }}
          FILES:           ${{ steps.files.outputs.files }}
        run: |
          # Prefix openai/ → aider usa cliente OpenAI-compatible contra LiteLLM proxy.
          # --yes-always: non-interactive total, autoconfirma todos los prompts.
          # Si el issue body listó archivos sugeridos, los pasamos como args
          # posicionales (equivalente a --file pero compatible con múltiples).
          # Si no los listó, dejamos que aider use su repo-map (más lento, peor
          # calidad, pero al menos intenta algo).
          if [ -n "$FILES" ]; then
            echo "▸ Pasando $(echo $FILES | wc -w) archivos sugeridos a aider"
            aider --model "openai/$MODEL" \
                  --yes-always \
                  --no-show-model-warnings \
                  --auto-commits \
                  --commit-prompt "fix: #${{ steps.issue.outputs.number }}" \
                  --message-file /tmp/issue-msg.txt \
                  $FILES
          else
            echo "▸ Sin archivos en el issue body — aider hace discovery (calidad reducida)"
            aider --model "openai/$MODEL" \
                  --yes-always \
                  --no-show-model-warnings \
                  --map-tokens 2048 \
                  --auto-commits \
                  --commit-prompt "fix: #${{ steps.issue.outputs.number }}" \
                  --message-file /tmp/issue-msg.txt
          fi

      - name: Push branch and open PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          # Si aider no hizo commits → no abrimos PR (nada que mezclar)
          if [ -z "$(git log "origin/$DEFAULT_BRANCH..HEAD" --oneline 2>/dev/null)" ]; then
            echo "Aider did not make commits. Closing run cleanly without PR."
            # Comentar en el issue para que el humano sepa que no hubo cambios
            gh issue comment "${{ steps.issue.outputs.number }}" --body \
              "🤖 aider corrió pero no aplicó cambios. Posibles causas: el archivo ya está en el estado deseado, el LLM no entendió el cambio, o faltan archivos en el bloque \`## Archivos sugeridos\` del issue. Revisar logs de [esta run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            exit 0
          fi
          git push "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git" "$BRANCH"
          TITLE=$(cat /tmp/issue-title.txt)
          PR_BODY=$(printf 'Closes #%s\n\n🤖 PR generado por `agent-fix.yml` con aider + `%s` vía LiteLLM (ollama.com primary, DeepSeek fallback).\n\nEspera el AI review automático en este PR.' "${{ steps.issue.outputs.number }}" "${{ steps.issue.outputs.model }}")
          gh pr create \
            --title "fix: $TITLE" \
            --body  "$PR_BODY" \
            --head  "$BRANCH" \
            --base  "$DEFAULT_BRANCH"
